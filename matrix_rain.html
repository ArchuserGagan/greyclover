<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particles Swarm Export</title>
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // CONFIG
        const COUNT = 20000;
        const SPEED_MULT = 1;
        const AUTO_SPIN = true;

        // SETUP
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.01);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 0, 100);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = AUTO_SPIN;
        controls.autoRotateSpeed = 2.0;

        // POST PROCESSING
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.strength = 1.8; bloomPass.radius = 0.4; bloomPass.threshold = 0;
        composer.addPass(bloomPass);

        // SWARM OBJECTS
        const dummy = new THREE.Object3D();
        const color = new THREE.Color();
        const target = new THREE.Vector3();
        const pColor = new THREE.Color(); // Kept for safety, for potential references
        
        // INSTANCED MESH
        const geometry = new THREE.TetrahedronGeometry(0.25);
        const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        const instancedMesh = new THREE.InstancedMesh(geometry, material, COUNT);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(instancedMesh);

        // DATA ARRAYS
        const positions = [];
        for(let i=0; i<COUNT; i++) {
            positions.push(new THREE.Vector3((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100));
            instancedMesh.setColorAt(i, color.setHex(0x00ff88)); // Init Color
        }

        // CONTROL STUBS
        const PARAMS = {"gridDensity":40,"sep":3.5,"dropLength":30,"speedBase":20,"rotationSpeed":0.5};
        const addControl = (id, label, min, max, val) => {
            return PARAMS[id] !== undefined ? PARAMS[id] : val;
        };
        const setInfo = () => {};
        const annotate = () => {};

        // ANIMATION LOOP
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime() * SPEED_MULT;
            
            // Shader Time Update
            if(material.uniforms && material.uniforms.uTime) {
                material.uniforms.uTime.value = time;
            }

            controls.update();

            // SWARM LOGIC
            const count = COUNT; // Alias for user code compatibility
            for(let i=0; i<COUNT; i++) {
                 // USER CODE INJECTION START
                 // --- Элементы управления (Controls) ---
                 // Увеличьте count частиц в настройках системы для максимальной плотности!
                 
                 // Плотность сетки XZ (сколько ручейков по ширине/глубине)
                 const gridDensity = addControl("gridDensity", "Grid Size XZ", 10, 100, 40);
                 // Расстояние между ручейками
                 const sep = addControl("sep", "Stream Spacing", 1.0, 10.0, 3.5);
                 // Длина одной нити символов (вертикальная плотность)
                 const dropLength = addControl("dropLength", "Code String Length", 5, 100, 30);
                 // Скорость падения
                 const speedBase = addControl("speedBase", "Fall Speed", 20, 300, 120);
                 // Скорость вращения куба
                 const rotationSpeed = addControl("rotationSpeed", "Cube Spin", 0.1, 2.0, 0.5);
                 
                 // --- Внутренние расчеты ---
                 // 1. Определяем, к какому вертикальному ручейку принадлежит частица
                 const numStreams = gridDensity * gridDensity;
                 const streamId = i % numStreams;
                 // 2. Определяем позицию частицы внутри этого ручейка (от 0 до dropLength)
                 const pId = Math.floor(i / numStreams);
                 
                 // Если частиц больше, чем (ручейков * длину нити), лишние не рисуем
                 if (pId >= dropLength) {
                     target.set(0, 0, 0); // Или position.set(-10000, 0, 0) чтобы спрятать
                     color.setRGB(0,0,0);
                 } else {
                     // --- Расчет базовой позиции (внутри куба) ---
                 
                     // Сетка XZ (расположение ручейков)
                     let gridX = streamId % gridDensity;
                     let gridZ = Math.floor(streamId / gridDensity);
                     const off = (gridDensity * sep) / 2;
                 
                     const posX = gridX * sep - off;
                     const posZ = gridZ * sep - off;
                 
                     // Анимация падения по Y (логика из Матрицы)
                     // Используем псевдорандом для смещения времени старта каждого ручейка
                     const randOffset = Math.sin(streamId * 34.1234) * 1000.0;
                     const fallSpeed = speedBase * (0.6 + Math.abs(Math.cos(streamId * 78.4321)) * 0.8);
                 
                     const boundsY = gridDensity * sep; // Высота куба равна его ширине
                     const halfBoundsY = boundsY / 2;
                     const spacingY = sep * 0.8; // Расстояние между символами в нити
                 
                     // Голова ручейка
                     const headY = (-( (time + randOffset) * fallSpeed) % boundsY + boundsY) % boundsY;
                     // Позиция конкретной частицы с учетом зацикливания внутри Y границ
                     let posY = ((headY + pId * spacingY) % boundsY + boundsY) % boundsY - halfBoundsY;
                 
                 
                     // --- Вращение всего куба ---
                     // Угол зависит от времени
                     const angle = time * rotationSpeed;
                     const cosA = Math.cos(angle);
                     const sinA = Math.sin(angle);
                 
                     // Вращение вокруг оси Y (posX и posZ меняются, posY нет)
                     const rotatedX = posX * cosA - posZ * sinA;
                     const rotatedZ = posX * sinA + posZ * cosA;
                 
                     // Вращение вокруг оси X (добавим немного наклона для 3D эффекта)
                     const tiltAngle = 0.3; // Фиксированный наклон
                     const cosT = Math.cos(tiltAngle);
                     const sinT = Math.sin(tiltAngle);
                 
                     const finalY = posY * cosT - rotatedZ * sinT;
                     const finalZ = posY * sinT + rotatedZ * cosT;
                 
                     target.set(rotatedX, finalY, finalZ);
                 
                 
                     // --- Раскраска (Matrix Green) ---
                     // (Логика из твоего первого примера)
                     const isHead = pId === 0 ? 1.0 : 0.0;
                     // pId идет от 0 (верх) до dropLength (низ).
                     // В Матрице голова внизу, хвост вверху. pId 0 - это голова.
                     const tailFade = pId / dropLength;
                 
                     const hue = 0.333; // Чистый зеленый
                     const sat = 1.0 - isHead * 0.8; // Голова почти белая
                     const flicker = Math.max(0.0, Math.sin(time * 20.0 + i * 0.5)) * 0.15;
                 
                     // Яркость: голова яркая, хвост затухает + мерцание
                     const light = isHead * 0.98 + (1.0 - isHead) * Math.max(0.01, 0.6 - tailFade * 1.0 + flicker);
                 
                     color.setHSL(hue, sat, light);
                 }
                 
                 // Инфо
                 if (i === 0) {
                     setInfo("Matrix Cube", "Rotating dense swarm");
                 }
                 // USER CODE INJECTION END

                 // LERP & UPDATE
                 positions[i].lerp(target, 0.1);
                 dummy.position.copy(positions[i]);
                 dummy.updateMatrix();
                 instancedMesh.setMatrixAt(i, dummy.matrix);
                 instancedMesh.setColorAt(i, color); // Fix: Use 'color' which user modifies
            }
            instancedMesh.instanceMatrix.needsUpdate = true;
            instancedMesh.instanceColor.needsUpdate = true;

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
